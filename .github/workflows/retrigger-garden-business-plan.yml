name: Retrigger Garden Business Plan Update

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/retrigger-garden-business-plan.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract patch, apply it, and clean up
        shell: bash
        run: |
          awk '
            /^          cat <<\x27EOF\x27 \| base64 -d > \/tmp\/garden-business-plan.patch$/ { in_patch=1; next }
            /^EOF$/ { if (in_patch) exit }
            in_patch { print }
          ' .github/workflows/apply-garden-business-plan.yml > /tmp/garden-business-plan.patch.b64

          base64 -d /tmp/garden-business-plan.patch.b64 > /tmp/garden-business-plan.patch
          git apply --index /tmp/garden-business-plan.patch

          rm .github/workflows/apply-garden-business-plan.yml
          rm .github/workflows/retrigger-garden-business-plan.yml

          git config user.name "alinachandel-max"
          git config user.email "alinachandel@gmail.com"
          git add -A
          git commit -m "Update greenhouse business plan"
          git push
