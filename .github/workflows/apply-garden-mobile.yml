name: Apply Garden Mobile Fixes

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-garden-mobile.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply mobile patch and clean up
        shell: bash
        run: |
          cat <<'EOF' | base64 -d > /tmp/garden-mobile.patch

EOF
          git apply --index /tmp/garden-mobile.patch
          rm .github/workflows/apply-garden-mobile.yml
          git config user.name "alinachandel-max"
          git config user.email "alinachandel@gmail.com"
          git add -A
          git commit -m "Improve greenhouse mobile responsiveness"
          git push
